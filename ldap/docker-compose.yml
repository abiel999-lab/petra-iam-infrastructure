services:
  openldap:
    image: osixia/openldap:1.5.0
    container_name: petra-openldap
    environment:
      LDAP_ORGANISATION: "Universitas Kristen Petra"
      LDAP_DOMAIN: "petra.ac.id"
      LDAP_ADMIN_PASSWORD: "SeongJinWoo999!"
      LDAP_CONFIG_PASSWORD: "SeongJinWoo999!"
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: "readonly"
      LDAP_READONLY_USER_PASSWORD: "SeongJinWoo999!"
      LDAP_TLS: "false"

      # Membantu Keycloak: expose memberOf
      LDAP_MEMBEROF: "true"
      LDAP_REFINT: "true"

      # Bootstrap schema + data dari folder yang kita mount
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"

    ports:
      - "389:389"
      - "636:636"

    volumes:
      - ./data:/var/lib/ldap
      - ./config:/etc/ldap/slapd.d

      # Custom schema (WAJIB, biar petraUUID/petraAccountStatus dll dikenali)
      - ./schema:/container/service/slapd/assets/config/bootstrap/schema/custom

      # Data bootstrap LDIF
      - ./ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom

    networks:
      - iamnet

    restart: unless-stopped

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: petra-phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8089:80"
    depends_on:
      - openldap

    networks:
      - iamnet

    restart: unless-stopped

networks:
  iamnet:
    external: true
    name: petra-iam-net
